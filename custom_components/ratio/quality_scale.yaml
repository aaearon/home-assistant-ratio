rules:
  # Bronze
  action-exceptions: done
  appropriate-polling: done
  brands:
    status: todo
    comment: Requires PR to home-assistant/brands with Ratio logo/icon assets.
  common-modules: done
  config-entry-unloading: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: >-
      Entities use the coordinator pattern with DataUpdateCoordinator;
      no direct event subscriptions are used.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  docs-configuration-parameters: done
  docs-troubleshooting: done
  entity-disabled-by-default: done
  entity-translations: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: >-
      Cloud-polling integration; chargers are not discoverable on the local
      network. Devices are discovered via the Ratio cloud API after login.
  discovery-update-info:
    status: exempt
    comment: >-
      No local network discovery; not applicable to cloud-polling integrations.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-use-cases: done
  entity-category: done
  entity-device-class: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: >-
      Auth failures trigger the reauth flow; transient errors use UpdateFailed
      with built-in backoff. No scenarios currently require repair issues.
  stale-devices: done

  # Platinum
  inject-websession: done
  strict-typing: done
