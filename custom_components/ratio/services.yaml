start_charge:
  name: Start charge
  description: Start a charge session on the targeted Ratio charger.
  target:
    device:
      integration: ratio
  fields:
    vehicle_id:
      name: Vehicle ID
      description: Optional vehicle ID to associate with the session.
      required: false
      example: "abc-123"
      selector:
        text:

stop_charge:
  name: Stop charge
  description: Stop the active charge session on the targeted Ratio charger.
  target:
    device:
      integration: ratio

set_schedule:
  name: Set schedule
  description: Replace the weekly charge schedule for the targeted Ratio charger.
  target:
    device:
      integration: ratio
  fields:
    slots:
      name: Slots
      description: List of schedule slots.
      required: true
      selector:
        object:

add_vehicle:
  name: Add vehicle
  description: Register a new vehicle on the Ratio account.
  fields:
    vehicle_name:
      name: Vehicle name
      description: Display name for the vehicle.
      required: true
      example: "Tesla Model 3"
      selector:
        text:
    license_plate:
      name: License plate
      description: Optional license plate.
      required: false
      example: "AB-12-CD"
      selector:
        text:

remove_vehicle:
  name: Remove vehicle
  description: Remove a vehicle from the Ratio account.
  fields:
    vehicle_id:
      name: Vehicle
      description: The vehicle to remove.
      required: true
      selector:
        text:

import_session_history:
  name: Import session history
  description: Backfill external statistics from completed charge sessions in the chosen window.
  fields:
    begin_time:
      name: Begin time
      description: Start of the window to import.
      required: true
      selector:
        datetime:
    end_time:
      name: End time
      description: Optional end of the window. Defaults to now.
      required: false
      selector:
        datetime:
