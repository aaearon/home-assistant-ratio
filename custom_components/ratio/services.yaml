start_charge:
  name: Start charge
  description: Start a charge session on the targeted Ratio charger.
  target:
  fields:
    vehicle_id:
      name: Vehicle ID
      description: Optional vehicle ID to associate with the session.
      required: false
      example: "abc-123"
      selector:
        text:

stop_charge:
  name: Stop charge
  description: Stop the active charge session on the targeted Ratio charger.
  target:

set_schedule:
  name: Set schedule
  description: >-
    Replace the weekly charge schedule for the targeted Ratio charger.
    Each slot must include a start time and an end time in HH:MM 24-hour
    format (e.g. "07:30") and a list of days (Monday-Sunday or 3-letter
    abbreviations like Mon/Tue).
  target:
  fields:
    slots:
      name: Slots
      description: >-
        List of schedule slots. Each slot is an object with the keys
        `start` (HH:MM), `end` (HH:MM), and `days` (list of weekday names).
      required: true
      example: |
        - start: "07:00"
          end: "09:00"
          days: [Mon, Tue, Wed, Thu, Fri]
      selector:
        object:

add_vehicle:
  name: Add vehicle
  description: Register a new vehicle on the Ratio account.
  fields:
    vehicle_name:
      name: Vehicle name
      description: Display name for the vehicle.
      required: true
      example: "Tesla Model 3"
      selector:
        text:
    license_plate:
      name: License plate
      description: Optional license plate.
      required: false
      example: "AB-12-CD"
      selector:
        text:

remove_vehicle:
  name: Remove vehicle
  description: Remove a vehicle from the Ratio account.
  fields:
    vehicle_id:
      name: Vehicle
      description: The vehicle to remove.
      required: true
      selector:
        text:

import_session_history:
  name: Import session history
  description: >-
    Backfill external statistics from completed charge sessions in the
    chosen window. begin_time must not predate the history-import
    baseline of any charger (the latest imported session timestamp,
    advanced by the live polling coordinator); otherwise the call is
    rejected to preserve monotonic energy statistics.
  fields:
    begin_time:
      name: Begin time
      description: Start of the window to import.
      required: true
      selector:
        datetime:
    end_time:
      name: End time
      description: Optional end of the window. Defaults to now.
      required: false
      selector:
        datetime:

reconfigure_wifi:
  name: Reconfigure Wi-Fi
  description: Reconnect the Ratio charger to a different Wi-Fi network via Bluetooth.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: ratio
    ssid:
      required: true
      selector:
        text:
    password:
      required: false
      selector:
        text:
          type: password
